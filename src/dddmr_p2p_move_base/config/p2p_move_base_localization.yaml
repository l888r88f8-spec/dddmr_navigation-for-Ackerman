p2p_move_base:
  ros__parameters:
    controller_frequency: 15.0                               # 主控制循环频率，越高控制更新越勤，但计算负载也越大
    planner_patience: 10.0                                   # 全局规划允许阻塞的最长时间
    oscillation_distance: 5.0                                # 超过该位移则认为已经脱离原地振荡
    oscillation_angle: 1.0                                   # 超过该转角则认为已经脱离原地振荡
    oscillation_patience: 15.0                               # 振荡状态容忍时间，过长会触发恢复/重规划
    controller_patience: 10.0                                # 局部控制连续失败多久后判定超时
    no_plan_retry_num: 10                                    # 全局规划失败后的重试次数
    waiting_patience: 10.0                                   # 等待状态最长持续时间
    drive_trajectory_generator_name: "ackermann_simple"      # 主跟踪使用的轨迹生成器，当前是阿克曼模型
    rotate_trajectory_generator_name: "ackermann_heading_rotate_shortest" # 仅作为兼容别名保留，底层仍是旋转理论插件
    recovery_behavior_name: ""
global_plan_manager:
  ros__parameters:
    global_planner_action_name: "get_dwa_plan"
    global_plan_query_frequency: 5.0                         # 全局路径重查询频率

mcl_ip:
  ros__parameters:
    # leishen16
    laser:
        odom_type: "laser_odometry"         #wheel_odometry/laser_odometry 
        baselink_frame: "base_link"
        num_vertical_scans: 16
        num_horizontal_scans: 1000
        ground_scan_index: 7
        vertical_angle_bottom: -15.0        # degrees
        vertical_angle_top: 15.0            # degrees
        scan_period: 0.05                   # seconds


    imageProjection:
        segment_valid_point_num: 5
        segment_valid_line_num: 2
        segment_theta: 60.0                      # decrese this value may improve accuracy
        maximum_detection_range: 120.0            # point cloud within this range will be used to project image
        distance_for_patch_between_rings: 1.0    # patch ground between rings within this range, i.e. ring0 and ring1 is smaller than 1 meter, patch them

mcl_fa:
  ros__parameters:

    featureAssociation:
        edge_threshold: 0.1
        surf_threshold: 0.1
        nearest_feature_search_distance: 3.0

sub_maps:
  ros__parameters:
    pose_graph_dir: "/home/robot/nav26_ws/src/dddmr_navigation/src/dddmr_p2p_move_base/map"
    sub_map_search_radius: 50.0
    sub_map_warmup_trigger_distance: 20.0
    complete_map_voxel_size: 0.4
mcl_3dl:
  ros__parameters:
    init_x: 0.0
    init_y: 0.0
    init_z: 0.0
    init_roll: 0.0
    init_pitch: 0.0
    init_yaw: 0.0
    init_var_x: 2.0
    init_var_y: 2.0
    init_var_z: 0.5
    init_var_roll: 0.1
    init_var_pitch: 0.1
    init_var_yaw: 0.5
    map_frame: "map"
    robot_frame: "base_link"
    odom_frame: "odom"
    map_downsample_x: 0.1
    map_downsample_y: 0.1
    map_downsample_z: 0.1
    map_update_interval_sec: 2 #int
    num_particles: 60

    resample_var_x: 0.2
    resample_var_y: 0.2
    resample_var_z: 0.2
    resample_var_yaw: 0.1
    resample_var_pitch: 0.2
    resample_var_roll: 0.2
    expansion_var_x: 0.5
    expansion_var_y: 0.5
    expansion_var_z: 0.5
    expansion_var_roll: 0.2
    expansion_var_pitch: 0.2
    expansion_var_yaw: 0.2
    match_ratio_thresh: 0.0

    euc_cluster_distance: 0.8
    euc_cluster_min_size: 3
    euc_cluster_max_size: 2400

    knn_num_of_ground_normals: 20

    update_min_d: 0.1
    update_min_a: 0.1

