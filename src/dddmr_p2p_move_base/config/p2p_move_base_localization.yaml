      num_points_global: 8
      match_dist_min: 0.3
      match_dist_flat: 0.05
      threshold_for_trusted_ground: 6
      radius_of_ground_search: 1.0

local_planner:
  ros__parameters:
    odom_topic: /lio_sam/localization/odometry               # 局部规划使用的位姿/速度来源
    # Ackermann rollout uses sim_time=2.0 and max_vel_x=3.0, so a 3 m prune
    # horizon makes the critics prefer short / slow trajectories. Keep the
    # local target farther ahead so faster valid rollouts are not penalized.
    forward_prune: 8.0                                       # 局部裁剪出的前向路径长度，越大越偏向远处目标
    backward_prune: 1.0                                      # 保留车后方路径长度，主要用于回看/裁剪稳定性
    heading_tracking_distance: 0.5                           # 用于估计当前路径朝向的前视距离
    # Ackermann platforms cannot rotate in place, so we skip the
    # initial heading-alignment phase and let the path follower turn while moving.
    heading_align_angle: 3.2                                 # 起步前朝向对齐阈值，阿克曼车这里设大表示基本跳过原地对齐
    prune_plane_timeout: 3.0 # 裁剪超时                       # 局部裁剪路径失效多久后判失败
    xy_goal_tolerance: 0.6                                   # 到达目标点的位置容差，单位 m
    # Likewise, do not require an in-place final heading alignment at the goal.
    yaw_goal_tolerance: 5.0                                  # 到达目标点的朝向容差，单位 rad；设大表示基本不要求末端转正
    controller_frequency: 15.0                               # 局部规划器内部控制频率
    debug_publish:
      robot_cuboid: false                                    # 调试车体包络，可视化时再打开
      aggregated_pc: true                                   # 聚合障碍点云很重，默认关闭
      prune_plan: false                                      # 裁剪后的局部路径，默认关闭
      accepted_trajectory: false                             # 所有通过筛选的轨迹，默认关闭
      best_trajectory: true                                 # 最优轨迹，默认关闭
      all_trajectories: false                                # 全部采样轨迹最重，默认关闭
    # 碰撞约束
    cuboid:
      # 车体包络盒，决定碰撞检测范围；调大更保守，调小更贴近车体但风险更高
      flb: [0.50, 0.32, -0.32] #front left buttom
      frb: [0.50, -0.32, -0.32]
      flt: [0.50, 0.32, 0.55] #front left top
      frt: [0.50, -0.32, 0.55]
      blb: [-0.38, 0.32, -0.32] #back left buttom
      brb: [-0.38, -0.32, -0.32]
      blt: [-0.38, 0.32, 0.55]
      brt: [-0.38, -0.32, 0.55]
# 恢复行为
recovery_behaviors:
  ros__parameters:
    plugins: ["rotate_inplace"]
    rotate_inplace:
      plugin: "recovery_behaviors::RotateInPlaceBehavior"
      frequency: 15.0
      tolerance: 0.3
      trajectory_generator_name: "ackermann_heading_rotate_inplace"
# 轨迹生成
trajectory_generators:
  ros__parameters:
    plugins: ["ackermann_simple", "ackermann_heading_rotate_inplace", "ackermann_heading_rotate_shortest"]
    ackermann_heading_rotate_shortest:
      plugin: "trajectory_generators::DDRotateInplaceTheory"
      controller_frequency: 10.0
      rotation_speed: 0.5
      cuboid:
        flb: [0.50, 0.32, -0.32] #front left buttom
        frb: [0.50, -0.32, -0.32]
        flt: [0.50, 0.32, 0.55] #front left top
        frt: [0.50, -0.32, 0.55]
        blb: [-0.38, 0.32, -0.32] #back left buttom
        brb: [-0.38, -0.32, -0.32]
        blt: [-0.38, 0.32, 0.55]
        brt: [-0.38, -0.32, 0.55]

    ackermann_heading_rotate_inplace:
      plugin: "trajectory_generators::DDRotateInplaceTheory"
      controller_frequency: 10.0
      rotation_speed: 0.5
      cuboid:
        flb: [0.50, 0.32, -0.32] #front left buttom
        frb: [0.50, -0.32, -0.32]
        flt: [0.50, 0.32, 0.55] #front left top
        frt: [0.50, -0.32, 0.55]
        blb: [-0.38, 0.32, -0.32] #back left buttom
        brb: [-0.38, -0.32, -0.32]
        blt: [-0.38, 0.32, 0.55]
        brt: [-0.38, -0.32, 0.55]
    
    ackermann_simple:
      plugin: "trajectory_generators::AckermannSimpleTrajectoryGeneratorTheory"
      max_vel_x: 3.0                                         # 允许的最大前进速度
      min_vel_x: 0.10                                        # 最小采样前进速度，越小越容易低速贴近目标
      max_vel_theta: 5.0                                     # 角速度上限，实际还会被阿克曼转角几何进一步限制
      min_vel_theta: 0.0
      acc_lim_x: 6.0                                         # 线速度加速度限制
      acc_lim_theta: 20.0                                    # 角速度加速度限制
      deceleration_ratio: 2.0                                # 允许减速窗口比例，越大越容易快速收速
      max_motor_shaft_rpm: 3000.0
      wheel_diameter: 0.16
      gear_ratio: 1.0
      robot_radius: 0.25
      wheelbase: 0.549185                                    # 轴距，决定最小转弯半径
      max_steer: 0.69                                        # 最大前轮转角，决定几何可实现的最大曲率
      
      controller_frequency: 15.0                             # 轨迹生成采样频率
      sim_time: 2.0                                          # 单条轨迹向前仿真的时长，越长越早开始考虑绕障/转向
      linear_x_sample: 5.0                                   # 线速度采样数，越大候选更密但更耗时
      angular_z_sample: 10.0                                 # 角速度采样数，越大转向候选更密但更耗时
      sim_granularity: 0.05                                  # 线位移仿真步长
      angular_sim_granularity: 0.025                         # 角位移仿真步长

      cuboid:
        flb: [0.50, 0.32, -0.32] #front left buttom
        frb: [0.50, -0.32, -0.32]
        flt: [0.50, 0.32, 0.55] #front left top
        frt: [0.50, -0.32, 0.55]
        blb: [-0.38, 0.32, -0.32] #back left buttom
        brb: [-0.38, -0.32, -0.32]
        blt: [-0.38, 0.32, 0.55]
        brt: [-0.38, -0.32, 0.55]
# 代价模型
mpc_critics:
  ros__parameters:
    # 代价模型：数值越大，越不喜欢对应类型的轨迹
    plugins: ["collision", "prefer_forward_speed", "stick_path", "pure_pursuit", "toward_global_plan", "collision_rotate", "collision_rotate_shortest", "prefer_rotate_shortest"]
    collision:
      plugin: "mpc_critics::CollisionModel"
      trajectory_generator: ackermann_simple
      weight: 1.0                                            # 碰撞代价总权重
      search_radius: 3.0                                     # 检查每个轨迹点附近障碍物的搜索半径
      clearance_penalty_distance: 0.5                        # 与障碍距离小于该值就开始惩罚，越大越早避障
      clearance_weight: 1.5                                  # 近障碍惩罚强度，越大越保守
    prefer_forward_speed:
      plugin: "mpc_critics::PreferForwardSpeedModel"
      trajectory_generator: ackermann_simple
      weight: 1.0                                            # 速度偏好权重，越大越不喜欢慢轨迹
      target_speed: 2.2                                      # 中段巡航期偏好的目标速度
      goal_slowdown_distance: 2.0                            # 距终点小于该距离后开始主动降速
      goal_slowdown_min_speed: 0.0                           # 靠近终点时允许降到的最低目标速度
    stick_path:
      plugin: "mpc_critics::StickPathModel"
      trajectory_generator: ackermann_simple
      weight: 0.05                                           # 贴近裁剪路径的偏好，越大越不愿意偏出全局路径
    pure_pursuit:
      plugin: "mpc_critics::PurePursuitModel"
      trajectory_generator: ackermann_simple
      weight: 0.35                                           # 追踪终点姿态/位置误差的总权重
      translation_weight: 1.0                                # 更关注轨迹终点与目标点的位置误差
      orientation_weight: 0.0                                # 更关注轨迹终点朝向误差；阿克曼末端过冲时通常应减小
    toward_global_plan:
      plugin: "mpc_critics::TowardGlobalPlanModel"
      trajectory_generator: ackermann_simple
      weight: 0.5                                            # 轨迹末端贴近全局路径的权重
    collision_rotate:
      plugin: "mpc_critics::CollisionModel"
      trajectory_generator: ackermann_heading_rotate_inplace
      weight: 1.0
    collision_rotate_shortest:
      plugin: "mpc_critics::CollisionModel"
      trajectory_generator: ackermann_heading_rotate_shortest
      weight: 1.0    
    prefer_rotate_shortest:
      plugin: "mpc_critics::ShortestAngleModel"
      trajectory_generator: ackermann_heading_rotate_shortest
      weight: 1.0

perception_3d_local:
  ros__parameters:
    global_frame: "map"
    robot_base_frame: "base_link"
    max_obstacle_distance: 9999.0
    inscribed_radius: 0.5                                    # 车体内切安全半径，越大越保守
    inflation_descending_rate: 2.0
    inflation_radius: 0.5                                    # 障碍物在感知层的膨胀范围，越大越早避障
    sensors_collected_frequency: 10.0                        # 局部感知融合频率
    plugins: ["map", "lidar"]
    map:
      plugin: "perception_3d::StaticLayer"
      is_local_planner: true
      mapping_mode: false
      map_topic: "mapcloud"
      ground_topic: "mapground"
    lidar:
      plugin: "perception_3d::MultiLayerSpinningLidar"
      is_local_planner: true
      topic: "lio_sam/cloud_nonground"          # 局部避障使用的实时去地点云
      pub_gbl_marking_for_visualization: false
      vertical_FOV_top: 15.0
      vertical_FOV_bottom: -15.0
      scan_effective_positive_start: 90.0
      scan_effective_positive_end: 150.0
      scan_effective_negative_start: 90.0
      scan_effective_negative_end: 30.0
      xy_resolution: 0.05
      height_resolution: 0.05
      min_obstacle_height: -0.30
      marking_height: 2.0
      perception_window_size: 8.0 # keep the sensed local obstacle window aligned with the longer Ackermann rollout horizon # 局部避障感知窗口，越大越早看到远处障碍
      segmentation_ignore_ratio: 0.5 #f a segmentation match static pc with this ratio, we ignore it. ex: a wall
      expected_sensor_time: 0.2                              # 传感器允许延迟，超过会被认为数据过期

perception_3d_global:
  ros__parameters:
    global_frame: "map"
    robot_base_frame: "base_link"
    max_obstacle_distance: 9999.0
    inscribed_radius: 0.5
    inflation_descending_rate: 2.0
    inflation_radius: 1.5
    sensors_collected_frequency: 10.0
    plugins: ["map"]
    dgraph_publish_frequency: 1.0
    map:
      plugin: "perception_3d::StaticLayer"
      is_local_planner: false
      use_adaptive_connection: false #If true: the neighbors of node is sparse, it will automatically increase search radius.
      adaptive_connection_number: 20
      radius_of_ground_connection: 1.5 #If use_adaptive_connection=false, the radius search of the node is applied.
      intensity_search_radius: 1.0 #this value is suggested to be 1.0 meters, because if it is too large, the narrow passage will be miscalculated
      intensity_search_punish_weight: 0.3 #the weight for a node. Set this value higher means we dont like path planning cross a orphan node.
      static_imposing_radius: 1.5 #use map to add weight on each ground node
      map_topic: "mapcloud"
      ground_topic: "mapground"
      support:
        mapping_mode: false
          #if mapping mode is true, edge detection is automatically disabled
        enable_edge_detection: true
        generate_static_graph: false
          #the connection radius will be used
          #enable this value when using super dense ground say ground voxel size<=10 cm

    lidar:
      plugin: "perception_3d::MultiLayerSpinningLidar"
      is_local_planner: false
      topic: "lio_sam/cloud_nonground"
      pub_gbl_marking_for_visualization: true
      vertical_FOV_top: 15.0
      vertical_FOV_bottom: -15.0
      scan_effective_positive_start: 90.0
      scan_effective_positive_end: 150.0
      scan_effective_negative_start: 90.0
      scan_effective_negative_end: 30.0
      euclidean_cluster_extraction_tolerance: 0.1
      euclidean_cluster_extraction_min_cluster_size: 1
      xy_resolution: 0.05
      height_resolution: 0.05
      marking_height: 2.0
      perception_window_size: 5.0 #the window for marking/clearing in meter, we dont casting to maximum range of the sensor even it is gbl map
      segmentation_ignore_ratio: 1.1 #f a segmentation match static pc with this ratio, we ignore it. ex: a wall
      expected_sensor_time: 0.1

global_planner:
  ros__parameters:
    turning_weight: 0.1                                     # 全局路径转折惩罚，越大越偏向平滑路径
    enable_detail_log: false
    a_star_expanding_radius: 0.5

#if we use get_dwa_plan in global_plan_manager, we setup parameters for dwa_global_planner
dynamic_window_aware_global_planner:
  ros__parameters:
    look_ahead_distance: 2.0                                 # 全局重规划前视距离
    recompute_frequency: 5.0                                # 全局路径动态重算频率
    
