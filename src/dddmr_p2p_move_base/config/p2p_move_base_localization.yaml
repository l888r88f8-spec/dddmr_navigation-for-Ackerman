p2p_move_base:
  ros__parameters:
    orchestrator_frequency: 15.0                             # goal 调度循环频率，越高状态切换和控制接口消费越及时
    route_request_patience: 10.0                             # route 层允许阻塞的最长时间
    oscillation_distance: 5.0                                # 超过该位移则认为已经脱离原地振荡
    oscillation_angle: 1.0                                   # 超过该转角则认为已经脱离原地振荡
    oscillation_patience: 15.0                               # 振荡状态容忍时间，过长会触发恢复/重规划
    control_failure_patience: 10.0                           # controller 连续失败多久后判定超时
    max_recovery_attempts: 10                                # recovery action 的最大尝试次数
    blocked_wait_patience: 10.0                              # blocked wait 状态最长持续时间
    tracking_controller_name: "ackermann_simple"             # legacy_rollout 时为 rollout generator；切到 RPP 时可改成语义化标签如 rpp_tracking
    alignment_controller_name: "ackermann_heading_rotate_shortest" # legacy_rollout 时为对齐 generator；切到 RPP 时可改成语义化标签如 rpp_alignment
    recovery_action_name: ""

### 全局规划器和感知层参数
global_plan_manager:
  ros__parameters:
    route_action_name: "get_plan"
    route_request_frequency: 0.1                             # Route layer should be event-driven / low-frequency, not polled like a local reconnect service

global_planner:
  ros__parameters:
    turning_weight: 0.1                                     # 全局路径转折惩罚，越大越偏向平滑路径
    enable_detail_log: false
    a_star_expanding_radius: 0.5
    use_forward_hybrid_astar: true
    enable_direct_path_shortcut: false
    entry_connector:
      enable: true
      min_anchor_distance: 2.5
      max_anchor_distance: 4.0
      force_goal_heading: true
    hybrid_astar:
      wheelbase: 0.549185
      max_steer: 0.69
      heading_bin_count: 72
      primitive_length: 0.6
      primitive_step: 0.05
      projection_search_radius: 0.6
      goal_position_tolerance: 0.4
      goal_heading_tolerance: 0.35
      use_goal_heading: false
      steering_penalty: 0.2
      steering_change_penalty: 0.3
      heading_change_penalty: 0.4
      obstacle_penalty_weight: 1.0
      heuristic_heading_weight: 0.2
      turn_side_hysteresis_penalty: 0.8
      rearward_check_distance: 2.0
      rearward_allowance: 0.0
      rearward_excursion_penalty: 8.0
      rearward_hard_reject_distance: 0.08

# get_dwa_plan now acts as reconnect service (Connector layer), not default route source.
dynamic_window_aware_global_planner:
  ros__parameters:
    enable_reconnect_layer: false                           # D7.0 baseline reset: bypass reconnect/corridor/connector and publish route path only
    look_ahead_distance: 2.0                                # reconnect 目标参考距离（兼容旧参数）
    recompute_frequency: 2.0                                # reconnect 频率（兼容旧参数）
    reconnect_frequency: 2.0                                # Connector 层重接回频率
    corridor_forward_distance: 8.0                          # Corridor 前方窗口长度
    reconnect_target_distance: 2.0                          # 在 Corridor 中选择接回 anchor 的距离
    reconnect_deviation_threshold: 0.7                      # 偏离 Corridor 超过该阈值触发接回
    reconnect_heading_threshold: 1.3                        # 朝向偏差超过该阈值触发接回
    max_reconnect_failures_before_global_replan: 3.0        # 连续接回失败后触发 Route 层重算
    connector_goal_tolerance: 0.4                           # 到达 latched reconnect goal 的释放阈值
    connector_commit_distance: 1.5                          # 连接段执行到该距离后允许释放 latch
    connector_timeout_sec: 4.0                              # connector 锁定超时保护
    startup_replan_lock_distance: 0.8                       # 起步阶段锁定重规划距离，避免首段接入弧反复翻边
    startup_replan_lock_offtrack_tolerance: 0.8             # 机器人偏离当前DWA路径超过该距离时解除锁定
    preferred_turn_sign_lookahead_distance: 1.8             # 从机器人当前未走路径前视窗口估计转向偏好
    min_force_goal_heading_distance: 3.0                    # 仅远距离中间接入目标才强制终点朝向
    max_force_goal_heading_angle: 1.75                      # 起点朝向与切线夹角过大时不强制终点朝向

perception_3d_global:
  ros__parameters:
    global_frame: "map"
    robot_base_frame: "base_link"
    max_obstacle_distance: 9999.0
    inscribed_radius: 0.5
    inflation_descending_rate: 2.0
    inflation_radius: 1.5
    sensors_collected_frequency: 10.0
    plugins: ["map"]
    dgraph_publish_frequency: 1.0
    map:
      plugin: "perception_3d::StaticLayer"
      is_local_planner: false
      use_adaptive_connection: false #If true: the neighbors of node is sparse, it will automatically increase search radius.
      adaptive_connection_number: 20
      radius_of_ground_connection: 1.5 #If use_adaptive_connection=false, the radius search of the node is applied.
      intensity_search_radius: 1.0 #this value is suggested to be 1.0 meters, because if it is too large, the narrow passage will be miscalculated
      intensity_search_punish_weight: 0.3 #the weight for a node. Set this value higher means we dont like path planning cross a orphan node.
      static_imposing_radius: 1.5 #use map to add weight on each ground node
      map_topic: "mapcloud"
      ground_topic: "mapground"
      support:
        mapping_mode: false
          #if mapping mode is true, edge detection is automatically disabled
        enable_edge_detection: true
        generate_static_graph: false
        merge_ground_layers: true
        merge_ground_xy_resolution: 0.10
        merge_ground_z_tolerance: 0.12
          #the connection radius will be used
          #enable this value when using super dense ground say ground voxel size<=10 cm

    lidar:
      plugin: "perception_3d::MultiLayerSpinningLidar"
      is_local_planner: false
      topic: "lio_sam/cloud_nonground"
      pub_gbl_marking_for_visualization: true
      vertical_FOV_top: 15.0
      vertical_FOV_bottom: -15.0
      scan_effective_positive_start: 90.0
      scan_effective_positive_end: 150.0
      scan_effective_negative_start: 90.0
      scan_effective_negative_end: 30.0
      euclidean_cluster_extraction_tolerance: 0.1
      euclidean_cluster_extraction_min_cluster_size: 1
      xy_resolution: 0.05
      height_resolution: 0.05
      marking_height: 2.0
      perception_window_size: 5.0 #the window for marking/clearing in meter, we dont casting to maximum range of the sensor even it is gbl map
      segmentation_ignore_ratio: 1.1 #f a segmentation match static pc with this ratio, we ignore it. ex: a wall
      expected_sensor_time: 0.1
      
### 局部规划器参数
local_planner:
  ros__parameters:
    odom_topic: /lio_sam/localization/odometry               # 局部规划使用的位姿/速度来源
    controller_backend: "legacy_rollout"                     # 可选: legacy_rollout / regulated_pure_pursuit
    # Ackermann rollout uses sim_time=2.0 and max_vel_x=3.0, so a 3 m prune
    # horizon makes the critics prefer short / slow trajectories. Keep the
    # local target farther ahead so faster valid rollouts are not penalized.
    local_reference:
      forward_distance: 8.0                                  # 局部参考路径的前向窗口长度，越大越偏向远处目标
      backward_distance: 1.0                                 # 局部参考路径保留车后方窗口长度，用于回看/裁剪稳定性
    heading_tracking_distance: 0.5                           # 用于估计当前路径朝向的前视距离
    # Ackermann platforms cannot rotate in place, so we skip the
    # initial heading-alignment phase and let the path follower turn while moving.
    route_start_alignment:
      heading_tolerance: 3.2                                 # 起步对齐阈值；阿克曼车这里设大表示主流程直接进入 route tracking
    causal_prune_search_window: 40                           # causal prune 仅在当前进度附近搜索，避免跳到欧氏近但顺序错误的后续段
    causal_prune_max_index_jump: 15                          # 单周期允许推进的最大索引步长
    causal_prune_max_arc_jump: 2.0                           # 单周期允许推进的最大路径弧长，单位 m
    causal_prune_max_lateral_distance: 1.0                   # 机器人到候选 route segment 的最大横向距离
    causal_prune_max_heading_error: 1.75                     # 候选 route tangent 与当前车头允许的最大夹角
    min_heading_reference_length: 0.3                        # heading check 降级时允许使用的最小参考长度
    max_heading_reference_stale_cycles: 10                   # heading 参考短时复用的最大周期数
    max_prune_failure_cycles: 10                             # 连续 prune 失败多少周期后才允许确认偏离
    cached_pruned_path_timeout_sec: 0.8                      # prune 短时失败时复用上一帧有效局部路径的最长时间
    prune_plane_timeout: 3.0 # 裁剪超时                       # 局部裁剪路径失效多久后判失败
    xy_goal_tolerance: 0.6                                   # 到达目标点的位置容差，单位 m
    # Likewise, do not require an in-place final heading alignment at the goal.
    goal_alignment:
      heading_tolerance: 5.0                                 # 末端对齐容差，单位 rad；设大表示基本不要求末端转正
    controller_frequency: 15.0                               # 局部规划器内部控制频率
    rpp:
      critic_trajectory_generator_name: "ackermann_simple"   # RPP 候选轨迹复用哪套 critic 链做碰撞/路径一致性验证
      nominal_linear_speed: 1.0                              # RPP 常规巡航速度
      min_linear_speed: 0.15                                 # RPP 正常跟踪的最低前进速度
      alignment_linear_speed: 0.25                           # RPP 末端朝向对齐时的低速前进速度
      goal_slowdown_distance: 1.5                            # 距目标多近开始主动降速
      min_lookahead_distance: 1.0                            # RPP 最小前视距离
      max_lookahead_distance: 3.0                            # RPP 最大前视距离
      lookahead_time: 1.5                                    # 根据当前速度换算前视距离的时间尺度
      alignment_lookahead_distance: 1.0                      # 末端朝向对齐时使用的等效前视距离
      max_lateral_accel: 1.5                                 # 曲率调速的横向加速度上限
      prediction_horizon_sec: 1.5                            # RPP 单一候选轨迹的前向预测时长
      prediction_step_sec: 0.1                               # RPP 候选轨迹离散步长
      wheelbase: 0.549185                                    # Ackermann 轴距，用于曲率上限
      max_steer: 0.69                                        # 最大转角，用于曲率上限
      max_angular_velocity: 1.2                              # 输出角速度上限
    debug_publish:
      robot_cuboid: false                                    # 调试车体包络，可视化时再打开
      aggregated_pc: false                                   # 聚合障碍点云很重，默认关闭
      prune_plan: false                                      # 裁剪后的局部路径，默认关闭
      accepted_trajectory: false                             # 所有通过筛选的轨迹，默认关闭
      best_trajectory: true                                 # 最优轨迹，默认关闭
      all_trajectories: false                                # 全部采样轨迹最重，默认关闭
    # 碰撞约束
    cuboid:
      # 车体包络盒，决定碰撞检测范围；调大更保守，调小更贴近车体但风险更高
      flb: [0.50, 0.32, -0.32] #front left buttom
      frb: [0.50, -0.32, -0.32]
      flt: [0.50, 0.32, 0.55] #front left top
      frt: [0.50, -0.32, 0.55]
      blb: [-0.38, 0.32, -0.32] #back left buttom
      brb: [-0.38, -0.32, -0.32]
      blt: [-0.38, 0.32, 0.55]
      brt: [-0.38, -0.32, 0.55]

perception_3d_local:
  ros__parameters:
    global_frame: "map"
    robot_base_frame: "base_link"
    max_obstacle_distance: 9999.0
    inscribed_radius: 0.5                                    # 车体内切安全半径，越大越保守
    inflation_descending_rate: 2.0
    inflation_radius: 0.5                                    # 障碍物在感知层的膨胀范围，越大越早避障
    sensors_collected_frequency: 10.0                        # 局部感知融合频率
    plugins: ["map", "lidar"]
    map:
      plugin: "perception_3d::StaticLayer"
      is_local_planner: true
      mapping_mode: false
      map_topic: "mapcloud"
      ground_topic: "mapground"
    lidar:
      plugin: "perception_3d::MultiLayerSpinningLidar"
      is_local_planner: true
      topic: "lio_sam/cloud_nonground"          # 局部避障使用的实时去地点云
      pub_gbl_marking_for_visualization: false
      vertical_FOV_top: 15.0
      vertical_FOV_bottom: -15.0
      scan_effective_positive_start: 90.0
      scan_effective_positive_end: 150.0
      scan_effective_negative_start: 90.0
      scan_effective_negative_end: 30.0
      xy_resolution: 0.05
      height_resolution: 0.05
      min_obstacle_height: -0.30
      marking_height: 2.0
      perception_window_size: 8.0 # keep the sensed local obstacle window aligned with the longer Ackermann rollout horizon # 局部避障感知窗口，越大越早看到远处障碍
      segmentation_ignore_ratio: 0.5 #f a segmentation match static pc with this ratio, we ignore it. ex: a wall
      expected_sensor_time: 0.2                              # 传感器允许延迟，超过会被认为数据过期

# 恢复行为
recovery_behaviors:
  ros__parameters:
    plugins: ["rotate_inplace"]
    rotate_inplace:
      plugin: "recovery_behaviors::RotateInPlaceBehavior"
      frequency: 15.0
      tolerance: 0.3
      trajectory_generator_name: "ackermann_heading_rotate_inplace"
# 轨迹生成
trajectory_generators:
  ros__parameters:
    plugins: ["ackermann_simple", "ackermann_heading_rotate_inplace", "ackermann_heading_rotate_shortest"]
    ackermann_heading_rotate_shortest:
      plugin: "trajectory_generators::DDRotateInplaceTheory"
      controller_frequency: 10.0
      rotation_speed: 0.5
      cuboid:
        flb: [0.50, 0.32, -0.32] #front left buttom
        frb: [0.50, -0.32, -0.32]
        flt: [0.50, 0.32, 0.55] #front left top
        frt: [0.50, -0.32, 0.55]
        blb: [-0.38, 0.32, -0.32] #back left buttom
        brb: [-0.38, -0.32, -0.32]
        blt: [-0.38, 0.32, 0.55]
        brt: [-0.38, -0.32, 0.55]

    ackermann_heading_rotate_inplace:
      plugin: "trajectory_generators::DDRotateInplaceTheory"
      controller_frequency: 10.0
      rotation_speed: 0.5
      cuboid:
        flb: [0.50, 0.32, -0.32] #front left buttom
        frb: [0.50, -0.32, -0.32]
        flt: [0.50, 0.32, 0.55] #front left top
        frt: [0.50, -0.32, 0.55]
        blb: [-0.38, 0.32, -0.32] #back left buttom
        brb: [-0.38, -0.32, -0.32]
        blt: [-0.38, 0.32, 0.55]
        brt: [-0.38, -0.32, 0.55]
    
    ackermann_simple:
      plugin: "trajectory_generators::AckermannSimpleTrajectoryGeneratorTheory"
      max_vel_x: 1.0                                         # 允许的最大前进速度
      min_vel_x: 0.05                                        # 最小采样前进速度，越小越容易低速贴近目标
      max_vel_theta: 5.0                                     # 角速度上限，实际还会被阿克曼转角几何进一步限制
      min_vel_theta: 0.0
      acc_lim_x: 6.0                                         # 线速度加速度限制
      acc_lim_theta: 20.0                                    # 角速度加速度限制
      deceleration_ratio: 2.0                                # 允许减速窗口比例，越大越容易快速收速
      max_motor_shaft_rpm: 3000.0
      wheel_diameter: 0.16
      gear_ratio: 1.0
      robot_radius: 0.25
      wheelbase: 0.549185                                    # 轴距，决定最小转弯半径
      max_steer: 0.69                                        # 最大前轮转角，决定几何可实现的最大曲率
      
      controller_frequency: 15.0                             # 轨迹生成采样频率
      sim_time: 1.5                                          # 单条轨迹向前仿真的时长，越长越早开始考虑绕障/转向
      linear_x_sample: 5.0                                   # 线速度采样数，越大候选更密但更耗时
      angular_z_sample: 10.0                                 # 角速度采样数，越大转向候选更密但更耗时
      sim_granularity: 0.05                                  # 线位移仿真步长
      angular_sim_granularity: 0.025                         # 角位移仿真步长

      cuboid:
        flb: [0.50, 0.32, -0.32] #front left buttom
        frb: [0.50, -0.32, -0.32]
        flt: [0.50, 0.32, 0.55] #front left top
        frt: [0.50, -0.32, 0.55]
        blb: [-0.38, 0.32, -0.32] #back left buttom
        brb: [-0.38, -0.32, -0.32]
        blt: [-0.38, 0.32, 0.55]
        brt: [-0.38, -0.32, 0.55]
# 代价模型
mpc_critics:
  ros__parameters:
    # 代价模型：数值越大，越不喜欢对应类型的轨迹
    plugins: ["collision", "prefer_forward_speed", "stick_path", "pure_pursuit", "toward_global_plan", "collision_rotate", "collision_rotate_shortest", "prefer_rotate_shortest"]
    collision:
      plugin: "mpc_critics::CollisionModel"
      trajectory_generator: ackermann_simple
      weight: 1.0                                            # 碰撞代价总权重
      search_radius: 3.0                                     # 检查每个轨迹点附近障碍物的搜索半径
      clearance_penalty_distance: 0.5                        # 与障碍距离小于该值就开始惩罚，越大越早避障
      clearance_weight: 1.5                                  # 近障碍惩罚强度，越大越保守
    prefer_forward_speed:
      plugin: "mpc_critics::PreferForwardSpeedModel"
      trajectory_generator: ackermann_simple
      weight: 1.0                                            # 速度偏好权重，越大越不喜欢慢轨迹
      target_speed: 2.2                                      # 中段巡航期偏好的目标速度
      goal_slowdown_distance: 2.0                            # 距终点小于该距离后开始主动降速
      goal_slowdown_min_speed: 0.0                           # 靠近终点时允许降到的最低目标速度
    stick_path:
      plugin: "mpc_critics::StickPathModel"
      trajectory_generator: ackermann_simple
      weight: 0.05                                           # 贴近裁剪路径的偏好，越大越不愿意偏出全局路径
    pure_pursuit:
      plugin: "mpc_critics::PurePursuitModel"
      trajectory_generator: ackermann_simple
      weight: 0.35                                           # 追踪终点姿态/位置误差的总权重
      translation_weight: 1.0                                # 更关注轨迹终点与目标点的位置误差
      orientation_weight: 0.0                                # 更关注轨迹终点朝向误差；阿克曼末端过冲时通常应减小
    toward_global_plan:
      plugin: "mpc_critics::TowardGlobalPlanModel"
      trajectory_generator: ackermann_simple
      weight: 0.5                                            # 轨迹末端贴近全局路径的权重
    collision_rotate:
      plugin: "mpc_critics::CollisionModel"
      trajectory_generator: ackermann_heading_rotate_inplace
      weight: 1.0
    collision_rotate_shortest:
      plugin: "mpc_critics::CollisionModel"
      trajectory_generator: ackermann_heading_rotate_shortest
      weight: 1.0    
    prefer_rotate_shortest:
      plugin: "mpc_critics::ShortestAngleModel"
      trajectory_generator: ackermann_heading_rotate_shortest
      weight: 1.0
